# New Blueprint → connect GitHub repo → deploy "chaty-ws".
# Then in Vercel: Environment Variables → CHAT_WS_URL = wss://<this-service>.onrender.com → Redeploy.
services:
  - type: web
    name: chaty-ws
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_VERSION
        value: "22"
